<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Comisiones</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <header>
        <h1>Sistema de Comisiones</h1>
    </header>

    <section>
        <h2>Funcionarios</h2>
        <input type="text" id="nombreFuncionario" placeholder="Nombre">
        <button onclick="agregarFuncionario()">Agregar</button>

        <ul id="listaFuncionarios"></ul>
    </section>

    <section>
        <h2>Venta</h2>

        <select id="funcionarioVenta"></select>

        <select id="tipoVenta">
            <option value="celular">Celular</option>
            <option value="accesorio">Accesorio</option>
        </select>

        <input type="number" id="gananciaVenta" placeholder="Ganancia celular">
        <input type="number" id="cantidadVenta" placeholder="Cantidad accesorios">

        <button onclick="registrarVenta()">Registrar Venta</button>
    </section>

    <section>
        <h2>Comisiones</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>Funcionario</th>
                    <th>Comisión</th>
                </tr>
            </thead>
            <tbody id="tablaResumen"></tbody>
        </table>

        <h3>Total: <span id="totalComisiones"></span></h3>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
